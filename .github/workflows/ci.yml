name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  rust-pi:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Install GStreamer
        run: |
          sudo apt-get update
          sudo apt-get install -y libgstreamer1.0-dev libgstreamer-plugins-base1.0-dev \
            gstreamer1.0-plugins-good gstreamer1.0-tools pkg-config
      - run: cargo test -p replay-core
      - run: cargo test -p replay-engine
      - run: cargo clippy -p replay-core -- -D warnings
      - run: cargo clippy -p replay-engine -- -D warnings
      - run: cargo build -p replay-engine --release
