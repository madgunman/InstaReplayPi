# Example Pi appliance config — install to /etc/instant-replay/config.toml

[input]
device_id = "auto"
resolution = "auto"
fps = 0
pixel_format = "auto"

[output]
display_id = 0
fullscreen = true
show_status_overlay = false
auto_display = true

[replay]
buffer_seconds = 20
default_replay_seconds = 10
chunk_seconds = 1
speed = 0.5
mode = "marked"

[storage]
buffer_path = "/var/lib/instant-replay/buffer"
auto_clean_on_start = true

[hotkeys]
mark = "M"
replay = "R"
replay_last = "Space"
return_live = "L"
clear_mark = "C"

[appliance]
enabled = true
autostart_live = true

[operator]
enabled = true
display_id = 0
width = 800
height = 480
fullscreen = false
setup_pin = "0000"
setup_unlock_seconds = 600
